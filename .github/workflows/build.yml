name: Build and Push Images

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/vickyfyn3/commerce-backend:${{ github.sha }}
            ghcr.io/vickyfyn3/commerce-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/vickyfyn3/commerce-frontend:${{ github.sha }}
            ghcr.io/vickyfyn3/commerce-frontend:latest
          build-args: |
            VITE_BACKEND_URL=https://fyn3.com.ng
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Build and push admin
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          push: true
          tags: |
            ghcr.io/vickyfyn3/commerce-admin:${{ github.sha }}
            ghcr.io/vickyfyn3/commerce-admin:latest
          build-args: |
            VITE_BACKEND_URL=https://fyn3.com.ng

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ Images built and pushed successfully!\n\n**Images ready:**\n- \`ghcr.io/vickyfyn3/commerce-backend:${{ github.sha }}\`\n- \`ghcr.io/vickyfyn3/commerce-frontend:${{ github.sha }}\`\n- \`ghcr.io/vickyfyn3/commerce-admin:${{ github.sha }}\`\n\nMerge this PR then deploy manually when ready.`
            })
