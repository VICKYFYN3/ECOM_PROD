name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (commit SHA or latest)'
        required: true
        default: 'latest'
      confirm:
        description: 'Type DEPLOY to confirm'
        required: true

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event.inputs.confirm == 'DEPLOY' }}

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "❌ Deployment cancelled - confirmation not provided"
            exit 1
          fi

      - name: Check rollback window
        run: |
          DEPLOY_FILE=~/.last_deploy_time
          if [ -f "$DEPLOY_FILE" ]; then
            LAST_DEPLOY=$(cat $DEPLOY_FILE)
            NOW=$(date +%s)
            DIFF=$((NOW - LAST_DEPLOY))
            HOURS=$((DIFF / 3600))
            echo "Last deployment was ${HOURS} hours ago"
          else
            echo "No previous deployment found"
          fi

      - name: Restart backend
        run: |
          kubectl rollout restart deployment/backend
          kubectl rollout status deployment/backend --timeout=5m

      - name: Restart frontend
        run: |
          kubectl rollout restart deployment/frontend
          kubectl rollout status deployment/frontend --timeout=5m

      - name: Restart admin
        run: |
          kubectl rollout restart deployment/admin
          kubectl rollout status deployment/admin --timeout=5m

      - name: Stamp deployment time
        run: |
          date +%s > ~/.last_deploy_time
          kubectl annotate deployments backend frontend admin \
            deploy-time=$(date +%s) \
            deploy-sha=${{ github.event.inputs.image_tag }} \
            --overwrite

      - name: Verify deployment
        run: |
          echo "📦 Current pods:"
          kubectl get pods
          echo "✅ Deployment complete"
