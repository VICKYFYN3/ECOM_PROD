
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  progressDeadlineSeconds: 600
  replicas: 4
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: commerce-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 4001
          envFrom:
            - secretRef:
                name: commerce-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - port: 4001
      targetPort: 4001
